name: Feature request
description: Propose a new signal, output format, or integration.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What maintainer problem does this solve?
      description: >-
        slopguard exists to protect maintainer review time without gatekeeping
        contributors. Features that reject or label people rather than
        prioritizing work are out of scope (see GOVERNANCE.md).
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
